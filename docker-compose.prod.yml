version: '3.8'

services:
  db:
    image: mysql:9.7
    container_name: turatrip-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: turatrip_db
      MYSQL_USER: ${DB_USERNAME}   
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - turatrip-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: turatrip-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8088:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/turatrip_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      JPA_DDL_AUTO: validate
      PORT: 8080
    networks:
      - turatrip-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${API_URL}
    container_name: turatrip-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8087:3000"
    networks:
      - turatrip-net

volumes:
  mysql_data:

networks:
  turatrip-net:
    driver: bridge