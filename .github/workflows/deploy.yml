name: Deploy TuraTrip to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Limpiar código anterior en el VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Borra de forma limpia los archivos del repositorio anterior sin afectar los volúmenes de Docker
            find /var/www/seminario1/turatrip -mindepth 1 -delete 2>/dev/null || true

      - name: Copiar archivos al VPS vía SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: ".,!node_modules,!output,!.git,!.github"
          target: "/var/www/seminario1/turatrip"

      - name: Ejecutar comandos de Docker en el VPS por SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/seminario1/turatrip

            # Usamos 'EOF' (con comillas simples) para desactivar toda interpretación de variables
            cat <<'EOF' > .env
            DB_ROOT_PASSWORD="${{ secrets.DB_ROOT_PASSWORD }}"
            DB_USERNAME="${{ secrets.DB_USERNAME }}"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            JWT_EXPIRATION_MS="${{ secrets.JWT_EXPIRATION_MS }}"
            API_URL="${{ secrets.API_URL }}"
            FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
            SMTP_HOST="${{ secrets.SMTP_HOST }}"
            SMTP_PORT="${{ secrets.SMTP_PORT }}"
            SMTP_USERNAME="${{ secrets.SMTP_USERNAME }}"
            SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}"
            UPLOADS_DIR="${{ secrets.UPLOADS_DIR }}"
            MAX_FILE_SIZE="${{ secrets.MAX_FILE_SIZE }}"
            MAX_REQUEST_SIZE="${{ secrets.MAX_REQUEST_SIZE }}"
            EOF

            chmod 600 .env

            # Asegurar binarios en el PATH
            export PATH="$HOME/bin:$PATH"

            # Detección automática del socket Rootless
            if [ -S "/run/user/$(id -u)/docker.sock" ]; then
              export DOCKER_HOST="unix:///run/user/$(id -u)/docker.sock"
            elif [ -S "$HOME/.docker/run/docker.sock" ]; then
              export DOCKER_HOST="unix://$HOME/.docker/run/docker.sock"
            fi

            # Despliegue de la aplicación
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build

            # Limpieza de imágenes sin usar
            docker image prune -f
