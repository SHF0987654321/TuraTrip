name: Deploy TuraTrip to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Copiar archivos al VPS vía SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: ".,!node_modules,!output,!.git,!.github"
          target: "/var/www/seminario1/turatrip"
      
      - name: Ejecutar comandos de Docker en el VPS por SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/seminario1/turatrip
            
            # Usamos 'EOF' (con comillas simples) para desactivar toda interpretación de variables
            cat <<EOF > .env
            DB_ROOT_PASSWORD="${{ secrets.DB_ROOT_PASSWORD }}"
            DB_USERNAME="${{ secrets.DB_USERNAME }}"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            JWT_EXPIRATION_MS="${{ secrets.JWT_EXPIRATION_MS }}"
            API_URL="${{ secrets.API_URL }}"
            FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
            SMTP_HOST="${{ secrets.SMTP_HOST }}"
            SMTP_PORT="${{ secrets.SMTP_PORT }}"
            SMTP_USERNAME="${{ secrets.SMTP_USERNAME }}"
            SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}"
            UPLOADS_DIR="${{ secrets.UPLOADS_DIR }}"
            EOF
            
            chmod 600 .env
            # Despliegue (Docker Rootless)
            export PATH=$HOME/bin:$PATH
            export DOCKER_HOST=unix:///home/turatrip/.docker/run/docker.sock
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build
            # Limpieza segura (solo imágenes huérfanas)
            docker image prune -f