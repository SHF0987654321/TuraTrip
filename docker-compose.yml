services:
  db:
    image: mysql:9.7
    container_name: turatrip-db-dev
    restart: on-failure # Cambiado de 'always' a 'on-failure' (mejor para dev)
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: turatrip_db
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306" # Expuesto al host local para desarrollo fácil
    volumes:
      - mysql_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - turatrip-net-dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: turatrip-backend-dev
    restart: "no" # En desarrollo prefieres controlar el reinicio manualmente
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080" # Expuesto para que puedas probar endpoints localmente
    volumes:
      - uploads_data_dev:${UPLOADS_DIR}  # Mapea carpeta local a /app/uploads
    environment:
      DB_URL: jdbc:mysql://db:3306/turatrip_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO} # Usa 'update' en dev
      PORT: 8080
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      UPLOADS_DIR: ${UPLOADS_DIR}
      API_URL: ${API_URL}
      LOGGING_LEVEL_ROOT: "DEBUG"
    networks:
      - turatrip-net-dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${API_URL}
    container_name: turatrip-frontend-dev
    restart: "no"
    depends_on:
      - backend
    ports:
      - "3000:3000" # Expuesto para acceder a la app web en localhost:3000
    networks:
      - turatrip-net-dev

volumes:
  mysql_data_dev:
  uploads_data_dev:

networks:
  turatrip-net-dev:
    driver: bridge
